name: paisa-rakhna-api
services:
  - name: web
    type: web
    instance_type: free
    regions:
      - was
    git:
      repository: github.com/m-asif2426/paisa-rakhna-api
      branch: main
    builder: buildpack
    build_command: composer install --no-dev --optimize-autoloader
    run_command: php artisan config:clear && php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - port: 8000
        protocol: http
    health_checks:
      - path: /
        port: 8000
